name: Deploy to Local Server

on:
  push:
    branches: [ master ]
  workflow_dispatch:

# 修改权限：不再需要 GitHub Pages 的权限，保留基础的读取权限即可
permissions:
  contents: read

# 确保只有一个部署任务同时运行
concurrency:
  group: "deploy-local"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.4
          run_install: false
          
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      
      - name: Build site
        run: pnpm run build

      # 将构建产物通过 SCP 上传到本地服务器
      - name: Upload Files to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22  # 如果你的服务器 SSH 端口不是 22，请在此修改
          source: "dist/*"
          target: "/www/wwwroot/blog.jamyido.cn/dist/" # 替换为你服务器上实际的网站根目录
          strip_components: 1 # 去除 dist 文件夹层级，直接将文件放入 target 目录

      # 通过 SSH 连接到服务器重载 Nginx（根据你的实际 Web 服务器调整）
      - name: Reload Web Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 检查 Nginx 配置是否正确
            sudo nginx -t
            # 重载 Nginx 使新文件生效
            sudo systemctl reload nginx